{% extends 'blog_base_vercel.html' %}

{% block hero %}
<section class="hero-block compact">
    <div class="hero-grid hero-compact">
        <div>
            <span class="hero-eyebrow">标签云</span>
            <h1 class="hero-title">标签云</h1>
            <p class="hero-subtitle">从标签维度浏览全部文章内容，快速找到同类主题。</p>
            <div class="hero-meta-row">
                <span class="hero-meta-pill"><i data-lucide="tag"></i>{{ tags|length if tags else 0 }} 个标签</span>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block content %}
{% if tags %}
    {% include '_tag_overview_shared.html' %}
{% else %}
<div class="empty-state">
    <div class="empty-state-icon">🏷️</div>
    <h3>还没有标签</h3>
    <p>当文章设置标签后，这里会自动生成标签云。</p>
</div>
{% endif %}
{% endblock %}
