{% extends 'blog_base_hexo.html' %}

{% block hero %}
<div class="hero-banner">
    <div class="hero-content">
        <h1 class="hero-title">标签云</h1>
        <p class="hero-subtitle">浏览所有标签</p>
        <div class="hero-meta">
            <div class="hero-meta-item">
                <i data-lucide="tag"></i>
                <span>{{ tags|length if tags else 0 }} 个标签</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block content %}
{% if tags %}
    {% include '_tag_overview_shared.html' %}
{% else %}
    <div class="empty-state">
        <div class="empty-state-icon">🏷️</div>
        <p class="empty-state-text">还没有标签</p>
    </div>
{% endif %}
{% endblock %}
