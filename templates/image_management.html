{% extends "admin.html" %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='vendor/lightgallery/lightgallery.min.css') }}" />
<link rel="stylesheet" href="{{ url_for('static', filename='vendor/lightgallery/lg-zoom.min.css') }}" />
<link rel="stylesheet" href="{{ url_for('static', filename='vendor/lightgallery/lg-rotate.min.css') }}" />
<link rel="stylesheet" href="{{ url_for('static', filename='vendor/lightgallery/lg-thumbnail.min.css') }}" />
{% endblock %}

{% block content %}
<div class="card image-manager-shell">
    <div class="card-header image-manager-header">
        <div>
            <div class="image-manager-title">图片管理</div>
            <div class="image-manager-subtitle">支持搜索、状态筛选、多选批量删除和分页浏览，方便处理大批量图片。</div>
        </div>
        <button type="button" id="imageRefreshBtn" class="btn btn-secondary">刷新列表</button>
    </div>
    <div class="card-body image-manager-body">
        <div class="image-manager-toolbar">
            <div id="imageStats" class="image-manager-stats"></div>
            <div class="image-manager-controls">
                <label class="image-manager-field image-manager-search-field">
                    <span>搜索文件名</span>
                    <input type="search" id="imageSearchInput" class="form-control" placeholder="输入文件名或唯一名">
                </label>
                <label class="image-manager-field">
                    <span>状态筛选</span>
                    <select id="imageStatusFilter" class="form-control">
                        <option value="all">全部图片</option>
                        <option value="in_use">使用中</option>
                        <option value="not_in_use">未使用</option>
                        <option value="orphan">孤立图片</option>
                        <option value="db_only">仅数据库记录</option>
                    </select>
                </label>
                <label class="image-manager-field">
                    <span>排序方式</span>
                    <select id="imageSortBy" class="form-control">
                        <option value="created_desc" selected>上传时间 · 最新在前</option>
                        <option value="created_asc">上传时间 · 最早在前</option>
                        <option value="filename_asc">文件名 · A-Z</option>
                        <option value="filename_desc">文件名 · Z-A</option>
                    </select>
                </label>
                <label class="image-manager-field image-manager-page-size-field">
                    <span>每页显示</span>
                    <select id="imagePageSize" class="form-control">
                        <option value="24">24</option>
                        <option value="36" selected>36</option>
                        <option value="48">48</option>
                        <option value="72">72</option>
                    </select>
                </label>
            </div>
            <div class="image-manager-bulkbar">
                <div id="imageSelectionSummary" class="image-selection-summary">未选择图片</div>
                <div class="image-manager-actions">
                    <button type="button" id="imageSelectPageBtn" class="btn btn-secondary">选择本页</button>
                    <button type="button" id="imageClearSelectionBtn" class="btn btn-secondary">清空选择</button>
                    <button type="button" id="imageBulkDeleteBtn" class="btn btn-danger" disabled>批量删除</button>
                </div>
            </div>
        </div>

        <div id="imageGallery" class="image-gallery"></div>
        <div id="imageEmptyState" class="image-empty-state" hidden>
            <div class="image-empty-title">没有找到匹配的图片</div>
            <div class="image-empty-text">可以尝试切换筛选条件、清空搜索词，或者刷新图片列表。</div>
        </div>
        <div id="imagePagination" class="image-pagination" hidden></div>
    </div>
</div>

<style>
.image-manager-shell {
    overflow: hidden;
}

.image-manager-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
}

.image-manager-title {
    font-size: 20px;
    font-weight: 700;
    color: #0f172a;
}

.image-manager-subtitle {
    margin-top: 6px;
    font-size: 13px;
    line-height: 1.6;
    color: #64748b;
}

.image-manager-body {
    display: grid;
    gap: 14px;
}

.image-manager-toolbar {
    display: grid;
    gap: 10px;
    padding: 12px;
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
}

.image-manager-stats {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.image-stat-card {
    min-width: 96px;
    padding: 8px 10px;
    border-radius: 12px;
    border: 1px solid #dbe4f0;
    background: #ffffff;
    box-shadow: 0 8px 20px rgba(15, 23, 42, 0.04);
}

.image-stat-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #64748b;
}

.image-stat-value {
    margin-top: 3px;
    font-size: 19px;
    font-weight: 800;
    line-height: 1;
    color: #0f172a;
}

.image-manager-controls {
    display: grid;
    grid-template-columns: minmax(0, 1.5fr) minmax(160px, 0.8fr) minmax(190px, 1fr) minmax(118px, 0.42fr);
    gap: 10px;
}

.image-manager-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.image-manager-field > span {
    font-size: 11px;
    font-weight: 700;
    color: #334155;
}

.image-manager-bulkbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding-top: 0;
}

.image-selection-summary {
    font-size: 12px;
    color: #475569;
}

.image-manager-actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 8px;
}

.image-gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 12px;
}

.image-card {
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-radius: 16px;
    border: 1px solid #dbe4f0;
    background: #ffffff;
    box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
}

.image-card:hover {
    transform: translateY(-2px);
    border-color: #c7d7eb;
    box-shadow: 0 18px 42px rgba(15, 23, 42, 0.10);
}

.image-card.is-selected {
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12), 0 18px 42px rgba(15, 23, 42, 0.10);
}

.image-card-check {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 2;
    width: 16px;
    height: 16px;
    accent-color: #2563eb;
}

.image-card-link {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 164px;
    padding: 16px;
    background:
        linear-gradient(135deg, rgba(241, 245, 249, 0.92), rgba(226, 232, 240, 0.75)),
        radial-gradient(circle at top right, rgba(147, 197, 253, 0.18), transparent 42%);
    text-decoration: none;
    overflow: hidden;
}

.image-card-link::after {
    content: '';
    position: absolute;
    inset: auto 16px 12px;
    height: 28px;
    border-radius: 999px;
    background: rgba(15, 23, 42, 0.04);
    filter: blur(12px);
}

.image-card-link img {
    position: relative;
    z-index: 1;
    display: block;
    max-width: 100%;
    max-height: 132px;
    width: auto;
    height: auto;
    object-fit: contain;
    border-radius: 8px;
}

.image-card-link.is-missing {
    color: #94a3b8;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.02em;
}

.image-info {
    display: grid;
    gap: 8px;
    padding: 10px 10px 11px;
    border-top: 1px solid #eef2f7;
}

.image-filename {
    font-size: 12px;
    font-weight: 700;
    color: #0f172a;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.image-meta-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
}

.status-text {
    display: inline-flex;
    align-items: center;
    padding: 3px 8px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.02em;
}

.status-in-use {
    background: #dcfce7;
    color: #166534;
}

.status-not-in-use {
    background: #fee2e2;
    color: #b91c1c;
}

.status-orphan {
    background: #dbeafe;
    color: #1d4ed8;
}

.status-db-only {
    background: #fef3c7;
    color: #b45309;
}

.usage-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    min-height: 0;
    flex: 1 1 auto;
    justify-content: flex-start;
}

.usage-tag,
.usage-tag-link {
    display: inline-flex;
    align-items: center;
    padding: 2px 7px;
    border-radius: 999px;
    background: #eef2ff;
    color: #4338ca;
    font-size: 10px;
    font-weight: 700;
}

.usage-tag-link {
    text-decoration: none;
    transition: background-color 0.18s ease, color 0.18s ease;
}

.usage-tag-link:hover {
    background: #dbeafe;
    color: #1d4ed8;
}

.image-card-actions {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
}

.image-card-actions .btn {
    min-width: 58px;
    padding: 5px 9px;
    font-size: 12px;
}

.image-empty-state {
    padding: 42px 20px;
    border: 1px dashed #cbd5e1;
    border-radius: 18px;
    background: #f8fafc;
    text-align: center;
}

.image-empty-title {
    font-size: 16px;
    font-weight: 700;
    color: #0f172a;
}

.image-empty-text {
    margin-top: 8px;
    font-size: 13px;
    line-height: 1.6;
    color: #64748b;
}

.image-pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    padding-top: 2px;
}

.image-pagination-summary {
    font-size: 12px;
    color: #475569;
}

.image-pagination-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.image-pagination-buttons .btn.is-active {
    background: var(--color-primary);
    color: #fff;
    border-color: var(--color-primary);
}

.lg-counter {
    display: none !important;
}

.lg-custom-toolbar {
    position: absolute;
    top: 18px;
    left: 18px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    z-index: 1100;
    pointer-events: auto;
}

.lg-custom-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    height: 40px;
    padding: 0 14px;
    border-radius: 999px;
    backdrop-filter: blur(14px);
    background: rgba(15, 23, 42, 0.72);
    border: 1px solid rgba(255, 255, 255, 0.12);
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
    font-size: 13px;
    font-weight: 600;
    line-height: 1;
    color: #e2e8f0;
}

.lg-custom-count {
    min-width: 84px;
    justify-content: center;
    letter-spacing: 0.04em;
}

.lg-custom-watermark {
    color: #e2e8f0;
}

.lg-custom-watermark::before {
    content: '';
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.07);
}

.lg-status-in-use {
    color: #4ade80;
}

.lg-status-not-in-use {
    color: #f87171;
}

.lg-status-orphan {
    color: #60a5fa;
}

.lg-status-db-only {
    color: #fbbf24;
}

.lg-custom-delete {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    height: 40px;
    padding: 0 16px 0 14px;
    border: 1px solid rgba(248, 113, 113, 0.45);
    border-radius: 999px;
    background: rgba(127, 29, 29, 0.14);
    color: #fecaca;
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.02em;
    transition: transform 0.18s ease, background-color 0.18s ease, border-color 0.18s ease, color 0.18s ease;
}

.lg-custom-delete:hover {
    transform: translateY(-1px);
    background: rgba(153, 27, 27, 0.24);
    border-color: rgba(252, 165, 165, 0.68);
    color: #fff;
}

.lg-custom-delete svg {
    width: 15px;
    height: 15px;
    flex: 0 0 auto;
}

.lg-custom-delete-label {
    white-space: nowrap;
}

@media (max-width: 980px) {
    .image-manager-controls {
        grid-template-columns: 1fr;
    }

    .image-manager-bulkbar,
    .image-pagination {
        flex-direction: column;
        align-items: stretch;
    }

    .image-manager-actions,
    .image-pagination-buttons {
        justify-content: stretch;
    }

    .image-manager-actions .btn,
    .image-pagination-buttons .btn,
    .image-manager-header .btn {
        width: 100%;
        justify-content: center;
    }
}

@media (max-width: 768px) {
    .image-manager-header {
        flex-direction: column;
    }

    .image-gallery {
        grid-template-columns: repeat(auto-fill, minmax(158px, 1fr));
        gap: 10px;
    }

    .image-card-link {
        min-height: 142px;
        padding: 14px;
    }

    .image-card-link img {
        max-height: 108px;
    }

    .lg-custom-toolbar {
        top: 14px;
        left: 14px;
        gap: 8px;
        flex-wrap: wrap;
        max-width: calc(100vw - 92px);
    }

    .lg-custom-pill,
    .lg-custom-delete {
        height: 38px;
        padding: 0 13px 0 12px;
        font-size: 12px;
    }
}
</style>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='vendor/lightgallery/lightgallery.umd.js') }}"></script>
<script src="{{ url_for('static', filename='vendor/lightgallery/lg-zoom.min.js') }}"></script>
<script src="{{ url_for('static', filename='vendor/lightgallery/lg-rotate.min.js') }}"></script>
<script src="{{ url_for('static', filename='vendor/lightgallery/lg-thumbnail.min.js') }}"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const csrfToken = "{{ csrf_token() }}";
    const gallery = document.getElementById('imageGallery');
    const emptyState = document.getElementById('imageEmptyState');
    const statsNode = document.getElementById('imageStats');
    const paginationNode = document.getElementById('imagePagination');
    const searchInput = document.getElementById('imageSearchInput');
    const statusFilter = document.getElementById('imageStatusFilter');
    const sortBySelect = document.getElementById('imageSortBy');
    const pageSizeSelect = document.getElementById('imagePageSize');
    const selectionSummary = document.getElementById('imageSelectionSummary');
    const selectPageBtn = document.getElementById('imageSelectPageBtn');
    const clearSelectionBtn = document.getElementById('imageClearSelectionBtn');
    const bulkDeleteBtn = document.getElementById('imageBulkDeleteBtn');
    const refreshBtn = document.getElementById('imageRefreshBtn');

    const state = {
        allImages: [],
        filteredImages: [],
        currentPage: 1,
        pageSize: Number(pageSizeSelect.value) || 36,
        search: '',
        filter: 'all',
        sortBy: sortBySelect.value || 'created_desc',
        selected: new Set(),
        lightGalleryInstance: null,
        galleryEventsBound: false
    };

    function getEffectiveStatus(image) {
        if (image.status === 'orphan') return 'orphan';
        if (image.status === 'db_only') return 'db_only';
        return image.is_referenced ? 'in_use' : 'not_in_use';
    }

    function getStatusMeta(image) {
        const effectiveStatus = getEffectiveStatus(image);
        if (effectiveStatus === 'orphan') {
            return { key: effectiveStatus, label: '孤立图片', className: 'status-orphan', lgClassName: 'lg-status-orphan' };
        }
        if (effectiveStatus === 'db_only') {
            return { key: effectiveStatus, label: '仅数据库记录', className: 'status-db-only', lgClassName: 'lg-status-db-only' };
        }
        if (effectiveStatus === 'in_use') {
            return { key: effectiveStatus, label: '使用中', className: 'status-in-use', lgClassName: 'lg-status-in-use' };
        }
        return { key: effectiveStatus, label: '未使用', className: 'status-not-in-use', lgClassName: 'lg-status-not-in-use' };
    }

    function sortImages(images) {
        const order = { in_use: 0, not_in_use: 1, orphan: 2, db_only: 3 };
        const byName = (left, right, direction = 'asc') => {
            const factor = direction === 'desc' ? -1 : 1;
            return factor * String(left.display_name || left.unique_filename || left.filename || '')
                .localeCompare(String(right.display_name || right.unique_filename || right.filename || ''), 'zh-CN');
        };
        const byCreatedAt = (left, right, direction = 'desc') => {
            const leftTime = left.created_at ? Date.parse(left.created_at) : 0;
            const rightTime = right.created_at ? Date.parse(right.created_at) : 0;
            const factor = direction === 'asc' ? 1 : -1;
            if (leftTime !== rightTime) {
                return factor * (leftTime - rightTime);
            }
            return byName(left, right, 'asc');
        };
        return [...images].sort((left, right) => {
            const statusDiff = (order[getEffectiveStatus(left)] ?? 99) - (order[getEffectiveStatus(right)] ?? 99);
            if (statusDiff !== 0) return statusDiff;
            if (state.sortBy === 'filename_asc') return byName(left, right, 'asc');
            if (state.sortBy === 'filename_desc') return byName(left, right, 'desc');
            if (state.sortBy === 'created_asc') return byCreatedAt(left, right, 'asc');
            return byCreatedAt(left, right, 'desc');
        });
    }

    function filterImages() {
        const keyword = state.search.trim().toLowerCase();
        let nextImages = sortImages(state.allImages);

        if (state.filter !== 'all') {
            nextImages = nextImages.filter((image) => getEffectiveStatus(image) === state.filter);
        }

        if (keyword) {
            nextImages = nextImages.filter((image) => {
                const filename = String(image.filename || '').toLowerCase();
                const uniqueFilename = String(image.unique_filename || '').toLowerCase();
                return filename.includes(keyword) || uniqueFilename.includes(keyword);
            });
        }

        state.filteredImages = nextImages;
        const totalPages = Math.max(1, Math.ceil(nextImages.length / state.pageSize));
        if (state.currentPage > totalPages) {
            state.currentPage = totalPages;
        }
    }

    function getCurrentPageImages() {
        const start = (state.currentPage - 1) * state.pageSize;
        return state.filteredImages.slice(start, start + state.pageSize);
    }

    function updateSelectionSummary() {
        const selectedCount = state.selected.size;
        if (!selectedCount) {
            selectionSummary.textContent = `共 ${state.filteredImages.length} 项结果，未选择图片`;
        } else {
            selectionSummary.textContent = `已选择 ${selectedCount} 张图片，可批量删除`;
        }
        clearSelectionBtn.disabled = selectedCount === 0;
        bulkDeleteBtn.disabled = selectedCount === 0;

        const currentPageImages = getCurrentPageImages();
        const currentPageIds = currentPageImages.map((image) => image.unique_filename);
        const allSelectedOnPage = currentPageIds.length > 0 && currentPageIds.every((id) => state.selected.has(id));
        selectPageBtn.textContent = allSelectedOnPage ? '取消本页' : '选择本页';
        selectPageBtn.disabled = currentPageIds.length === 0;
    }

    function renderStats() {
        const counts = {
            total: state.allImages.length,
            in_use: 0,
            not_in_use: 0,
            orphan: 0,
            db_only: 0
        };

        state.allImages.forEach((image) => {
            counts[getEffectiveStatus(image)] += 1;
        });

        const items = [
            { label: '全部', value: counts.total },
            { label: '使用中', value: counts.in_use },
            { label: '未使用', value: counts.not_in_use },
            { label: '孤立图片', value: counts.orphan },
            { label: '仅数据库', value: counts.db_only }
        ];

        statsNode.innerHTML = '';
        items.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'image-stat-card';

            const label = document.createElement('div');
            label.className = 'image-stat-label';
            label.textContent = item.label;

            const value = document.createElement('div');
            value.className = 'image-stat-value';
            value.textContent = item.value;

            card.appendChild(label);
            card.appendChild(value);
            statsNode.appendChild(card);
        });
    }

    function mountPreviewDecorations(currentItem) {
        document.querySelectorAll('.lg-custom-toolbar').forEach((el) => el.remove());
        if (!currentItem) return;

        const currentItems = gallery.querySelectorAll('a[data-galleryable="true"]');
        const currentIndex = Array.from(currentItems).indexOf(currentItem);
        const statusMeta = getStatusMeta({
            status: currentItem.dataset.rawStatus,
            is_referenced: currentItem.dataset.isReferenced === 'true'
        });
        const uniqueFilename = currentItem.dataset.uniqueFilename;
        const outer = document.querySelector('.lg-outer');
        if (!outer || !uniqueFilename) return;

        const customToolbar = document.createElement('div');
        customToolbar.className = 'lg-custom-toolbar';

        const countPill = document.createElement('div');
        countPill.className = 'lg-custom-pill lg-custom-count';
        countPill.textContent = `${currentIndex + 1} / ${currentItems.length}`;

        const watermark = document.createElement('div');
        watermark.className = `lg-custom-pill lg-custom-watermark ${statusMeta.lgClassName}`;
        watermark.textContent = statusMeta.label;

        const deleteBtn = document.createElement('button');
        deleteBtn.type = 'button';
        deleteBtn.className = 'lg-custom-delete';
        deleteBtn.title = `删除图片 ${uniqueFilename}`;
        deleteBtn.setAttribute('aria-label', `删除图片 ${uniqueFilename}`);
        deleteBtn.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M9 3h6l1 2h4v2H4V5h4l1-2Zm1 7h2v7h-2v-7Zm4 0h2v7h-2v-7ZM7 10h2v7H7v-7Zm-1 10h12l1-13H5l1 13Z" fill="currentColor"/>
            </svg>
            <span class="lg-custom-delete-label">删除图片</span>
        `;
        deleteBtn.onclick = async () => {
            if (!confirm(`确定要删除这张图片吗？\n${uniqueFilename}`)) {
                return;
            }
            await deleteSingleImage(uniqueFilename, currentItem.dataset.rawStatus, true);
        };

        customToolbar.appendChild(countPill);
        customToolbar.appendChild(watermark);
        customToolbar.appendChild(deleteBtn);
        outer.appendChild(customToolbar);
    }

    function bindGalleryEvents() {
        if (state.galleryEventsBound) return;

        gallery.addEventListener('lgAfterSlide', (event) => {
            const index = event.detail.index;
            const currentItems = gallery.querySelectorAll('a[data-galleryable="true"]');
            mountPreviewDecorations(currentItems[index]);
        });

        gallery.addEventListener('lgAfterOpen', () => {
            const firstItem = gallery.querySelector('a[data-galleryable="true"]');
            mountPreviewDecorations(firstItem);
        });

        gallery.addEventListener('lgBeforeClose', () => {
            document.querySelectorAll('.lg-custom-toolbar').forEach((el) => el.remove());
        });

        state.galleryEventsBound = true;
    }

    function reinitializeLightGallery() {
        if (state.lightGalleryInstance) {
            state.lightGalleryInstance.destroy();
            state.lightGalleryInstance = null;
        }

        if (!gallery.querySelector('a[data-galleryable="true"]')) {
            return;
        }

        state.lightGalleryInstance = lightGallery(gallery, {
            licenseKey: 'GPLv3',
            plugins: [lgZoom, lgRotate, lgThumbnail],
            speed: 500,
            selector: 'a[data-galleryable="true"]',
            download: false,
            mobileSettings: { showCloseButton: true }
        });
    }

    function createImageCard(image) {
        const statusMeta = getStatusMeta(image);
        const card = document.createElement('div');
        card.className = 'image-card';
        if (state.selected.has(image.unique_filename)) {
            card.classList.add('is-selected');
        }

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'image-card-check';
        checkbox.checked = state.selected.has(image.unique_filename);
        checkbox.addEventListener('click', (event) => event.stopPropagation());
        checkbox.addEventListener('change', () => {
            if (checkbox.checked) {
                state.selected.add(image.unique_filename);
                card.classList.add('is-selected');
            } else {
                state.selected.delete(image.unique_filename);
                card.classList.remove('is-selected');
            }
            updateSelectionSummary();
        });

        const previewNode = document.createElement(image.url && image.url !== '#' ? 'a' : 'div');
        previewNode.className = 'image-card-link';
        previewNode.dataset.uniqueFilename = image.unique_filename;
        previewNode.dataset.rawStatus = image.status;
        previewNode.dataset.isReferenced = image.is_referenced ? 'true' : 'false';

        if (image.url && image.url !== '#') {
            previewNode.href = image.url;
            previewNode.dataset.galleryable = 'true';
            const img = document.createElement('img');
            img.src = image.url;
            img.alt = image.display_name || image.unique_filename || image.filename;
            img.loading = 'lazy';
            previewNode.appendChild(img);
        } else {
            previewNode.classList.add('is-missing');
            previewNode.textContent = '文件已不存在';
        }

        const info = document.createElement('div');
        info.className = 'image-info';

        const filename = document.createElement('div');
        filename.className = 'image-filename';
        const displayName = image.display_name || image.unique_filename || image.filename;
        filename.title = displayName;
        filename.textContent = displayName;

        const metaRow = document.createElement('div');
        metaRow.className = 'image-meta-row';

        const status = document.createElement('span');
        status.className = `status-text ${statusMeta.className}`;
        status.textContent = statusMeta.label;

        const usageTags = document.createElement('div');
        usageTags.className = 'usage-tags';
        const usageItems = Array.isArray(image.usage_items) ? image.usage_items : [];
        if (usageItems.length) {
            usageItems.forEach((item) => {
                const label = String(item?.label || '').trim();
                const targetUrl = String(item?.url || '').trim();
                const title = String(item?.title || '').trim();
                const tag = document.createElement(targetUrl ? 'a' : 'span');
                tag.className = targetUrl ? 'usage-tag-link' : 'usage-tag';
                tag.textContent = label || '用途';
                if (targetUrl) {
                    tag.href = targetUrl;
                    tag.target = '_blank';
                    tag.rel = 'noopener noreferrer';
                }
                if (title) {
                    tag.title = title;
                }
                usageTags.appendChild(tag);
            });
            metaRow.appendChild(usageTags);
        }
        metaRow.appendChild(status);

        const actions = document.createElement('div');
        actions.className = 'image-card-actions';

        const deleteBtn = document.createElement('button');
        deleteBtn.type = 'button';
        deleteBtn.className = 'btn btn-sm btn-danger';
        deleteBtn.textContent = '删除';
        deleteBtn.addEventListener('click', async (event) => {
            event.preventDefault();
            event.stopPropagation();
            if (!confirm(`确定要删除这张图片吗？\n${image.display_name || image.unique_filename || image.filename}`)) {
                return;
            }
            await deleteSingleImage(image.unique_filename, image.status, false);
        });

        actions.appendChild(deleteBtn);
        info.appendChild(filename);
        info.appendChild(metaRow);
        info.appendChild(actions);
        card.appendChild(checkbox);
        card.appendChild(previewNode);
        card.appendChild(info);
        return card;
    }

    function renderEmptyState() {
        const hasResults = state.filteredImages.length > 0;
        emptyState.hidden = hasResults;
        gallery.hidden = !hasResults;
    }

    function renderGallery() {
        gallery.innerHTML = '';
        const currentPageImages = getCurrentPageImages();
        currentPageImages.forEach((image) => {
            gallery.appendChild(createImageCard(image));
        });
        renderEmptyState();
        reinitializeLightGallery();
        updateSelectionSummary();
    }

    function createPageButton(label, disabled, onClick, isActive = false) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `btn btn-secondary${isActive ? ' is-active' : ''}`;
        button.textContent = label;
        button.disabled = disabled;
        button.addEventListener('click', onClick);
        return button;
    }

    function renderPagination() {
        paginationNode.innerHTML = '';
        const total = state.filteredImages.length;
        const totalPages = Math.max(1, Math.ceil(total / state.pageSize));
        paginationNode.hidden = total <= state.pageSize;

        if (paginationNode.hidden) {
            return;
        }

        const start = total === 0 ? 0 : (state.currentPage - 1) * state.pageSize + 1;
        const end = Math.min(state.currentPage * state.pageSize, total);

        const summary = document.createElement('div');
        summary.className = 'image-pagination-summary';
        summary.textContent = `显示 ${start}-${end} / ${total} 项`;

        const buttons = document.createElement('div');
        buttons.className = 'image-pagination-buttons';

        buttons.appendChild(createPageButton('上一页', state.currentPage === 1, () => {
            state.currentPage -= 1;
            rerender();
        }));

        const pageStart = Math.max(1, state.currentPage - 2);
        const pageEnd = Math.min(totalPages, pageStart + 4);
        const normalizedPageStart = Math.max(1, pageEnd - 4);
        for (let page = normalizedPageStart; page <= pageEnd; page += 1) {
            buttons.appendChild(createPageButton(String(page), false, () => {
                state.currentPage = page;
                rerender();
            }, page === state.currentPage));
        }

        buttons.appendChild(createPageButton('下一页', state.currentPage === totalPages, () => {
            state.currentPage += 1;
            rerender();
        }));

        paginationNode.appendChild(summary);
        paginationNode.appendChild(buttons);
    }

    function rerender() {
        filterImages();
        renderStats();
        renderGallery();
        renderPagination();
    }

    function pruneSelection() {
        const validIds = new Set(state.allImages.map((image) => image.unique_filename));
        Array.from(state.selected).forEach((uniqueFilename) => {
            if (!validIds.has(uniqueFilename)) {
                state.selected.delete(uniqueFilename);
            }
        });
    }

    async function requestJson(url, options = {}) {
        const response = await fetch(url, options);
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
            throw new Error(data.error || '请求失败');
        }
        return data;
    }

    async function fetchImages() {
        refreshBtn.disabled = true;
        refreshBtn.textContent = '刷新中...';
        try {
            const result = await requestJson('/api/images/all');
            state.allImages = Array.isArray(result.images) ? result.images : [];
            pruneSelection();
            rerender();
        } catch (error) {
            console.error('Error fetching images:', error);
            alert(error.message || '加载图片失败');
        } finally {
            refreshBtn.disabled = false;
            refreshBtn.textContent = '刷新列表';
        }
    }

    async function deleteSingleImage(uniqueFilename, rawStatus, fromPreview) {
        const currentIndex = fromPreview && state.lightGalleryInstance
            ? state.lightGalleryInstance.index
            : -1;
        try {
            await requestJson(`/api/images/delete/${encodeURIComponent(uniqueFilename)}?status=${encodeURIComponent(rawStatus)}`, {
                method: 'DELETE',
                headers: { 'X-CSRFToken': csrfToken }
            });
            const finalizeDelete = () => {
                state.selected.delete(uniqueFilename);
                state.allImages = state.allImages.filter((image) => image.unique_filename !== uniqueFilename);
                rerender();

                if (fromPreview && currentIndex >= 0) {
                    const visibleAnchors = gallery.querySelectorAll('a[data-galleryable="true"]');
                    if (visibleAnchors.length && state.lightGalleryInstance) {
                        const nextIndex = Math.min(currentIndex, visibleAnchors.length - 1);
                        window.setTimeout(() => {
                            if (state.lightGalleryInstance) {
                                state.lightGalleryInstance.openGallery(nextIndex);
                            }
                        }, 60);
                    }
                }
            };

            if (fromPreview && state.lightGalleryInstance) {
                const destroyDelay = state.lightGalleryInstance.destroy() || 0;
                state.lightGalleryInstance = null;
                window.setTimeout(finalizeDelete, destroyDelay + 30);
                return;
            }

            finalizeDelete();
        } catch (error) {
            alert(`删除失败：${error.message || '未知错误'}`);
        }
    }

    async function deleteSelectedImages() {
        const items = state.allImages
            .filter((image) => state.selected.has(image.unique_filename))
            .map((image) => ({
                unique_filename: image.unique_filename,
                status: image.status
            }));

        if (!items.length) {
            alert('请先选择要删除的图片');
            return;
        }

        if (!confirm(`确定要批量删除已选择的 ${items.length} 张图片吗？`)) {
            return;
        }

        bulkDeleteBtn.disabled = true;
        bulkDeleteBtn.textContent = '删除中...';

        try {
            const result = await requestJson('/api/images/bulk-delete', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify({ items })
            });

            const failed = Array.isArray(result.results) ? result.results.filter((item) => !item.success) : [];
            const succeededIds = new Set(
                Array.isArray(result.results)
                    ? result.results.filter((item) => item.success).map((item) => item.unique_filename)
                    : []
            );

            if (succeededIds.size) {
                state.allImages = state.allImages.filter((image) => !succeededIds.has(image.unique_filename));
                succeededIds.forEach((uniqueFilename) => state.selected.delete(uniqueFilename));
            }

            rerender();

            if (failed.length) {
                const detail = failed.slice(0, 5).map((item) => `${item.unique_filename}: ${item.error || '删除失败'}`).join('\n');
                alert(`已删除 ${result.success_count} 张，失败 ${result.failure_count} 张。\n\n${detail}`);
            } else {
                alert(`批量删除完成，共删除 ${result.success_count} 张图片。`);
            }
        } catch (error) {
            alert(`批量删除失败：${error.message || '未知错误'}`);
        } finally {
            bulkDeleteBtn.disabled = false;
            bulkDeleteBtn.textContent = '批量删除';
        }
    }

    searchInput.addEventListener('input', () => {
        state.search = searchInput.value || '';
        state.currentPage = 1;
        rerender();
    });

    statusFilter.addEventListener('change', () => {
        state.filter = statusFilter.value;
        state.currentPage = 1;
        rerender();
    });

    sortBySelect.addEventListener('change', () => {
        state.sortBy = sortBySelect.value || 'created_desc';
        state.currentPage = 1;
        rerender();
    });

    pageSizeSelect.addEventListener('change', () => {
        state.pageSize = Number(pageSizeSelect.value) || 36;
        state.currentPage = 1;
        rerender();
    });

    refreshBtn.addEventListener('click', fetchImages);

    selectPageBtn.addEventListener('click', () => {
        const currentPageIds = getCurrentPageImages().map((image) => image.unique_filename);
        const allSelectedOnPage = currentPageIds.length > 0 && currentPageIds.every((id) => state.selected.has(id));
        if (allSelectedOnPage) {
            currentPageIds.forEach((id) => state.selected.delete(id));
        } else {
            currentPageIds.forEach((id) => state.selected.add(id));
        }
        renderGallery();
    });

    clearSelectionBtn.addEventListener('click', () => {
        state.selected.clear();
        renderGallery();
    });

    bulkDeleteBtn.addEventListener('click', deleteSelectedImages);

    bindGalleryEvents();
    fetchImages();
});
</script>
{% endblock %}
